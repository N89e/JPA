name: Déploiement Portfolio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Installer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Tester Backend
      run: |
        cd backend
        npm install
        npm run build 2>/dev/null || true
    
    - name: Vérifier Frontend
      run: |
        cd frontend
        npm install
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: portfolio-build
        path: |
          backend/
          frontend/
